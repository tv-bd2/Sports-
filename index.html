<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PRO IPTV Player</title>

<script src="https://cdn.jwplayer.com/libraries/KB5zFt7A.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
margin:0;
background:#000;
font-family:Arial;
}

/* Top bar */
.topbar{
position:fixed;
top:0;
left:0;
width:100%;
height:45px;
background:#111;
color:#00ffcc;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 12px;
z-index:10;
}

.live{
color:#fff;
background:red;
padding:3px 8px;
border-radius:4px;
font-size:12px;
}

/* player */
#player, video{
position:absolute;
top:45px;
left:0;
width:100%;
height:calc(100% - 45px);
background:#000;
}

/* loader */
#loading{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:#00ffcc;
z-index:5;
}
</style>
</head>

<body>

<div class="topbar">
<div>🔥 PRO TV</div>
<div class="live">LIVE</div>
</div>

<div id="loading">Loading Stream...</div>

<div id="player"></div>
<video id="video" controls autoplay style="display:none;"></video>

<script>
const url = "http://198.195.239.50:8095/Tsports/index.m3u8";

/* ===== JW PLAYER TRY FIRST ===== */
try {
    jwplayer("player").setup({
        file: url,
        width: "100%",
        height: "100%",
        autostart: true,
        mute: false,
        primary: "html5"
    });

    jwplayer().on("play", function(){
        document.getElementById("loading").style.display = "none";
    });

    jwplayer().on("error", fallbackHLS);

} catch(e){
    fallbackHLS();
}

/* ===== HLS FALLBACK ===== */
function fallbackHLS(){
    document.getElementById("player").style.display = "none";
    let video = document.getElementById("video");
    video.style.display = "block";

    if (Hls.isSupported()) {
        let hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, function () {
            video.play();
            document.getElementById("loading").style.display = "none";
        });

    } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
        video.src = url;
        video.addEventListener("loadedmetadata", function () {
            video.play();
            document.getElementById("loading").style.display = "none";
        });
    } else {
        document.getElementById("loading").innerText = "Stream not supported!";
    }
}
</script>

</body>
</html>
