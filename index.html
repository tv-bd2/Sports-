<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Universal Player</title>
<script src="https://cdn.jwplayer.com/libraries/KB5zFt7A.js"></script>
<style>
html,body{
margin:0;
padding:0;
background:#000;
height:100%;
overflow:hidden;
}
#player,video{
width:100%;
height:100%;
background:#000;
}
#nativeVideo{display:none;}
.badge{
position:fixed;
top:10px;
right:10px;
background:red;
color:#fff;
padding:4px 8px;
font-size:12px;
border-radius:4px;
z-index:99;
}
</style>
</head>
<body>

<div class="badge">LIVE</div>

<div id="player"></div>
<video id="nativeVideo" controls autoplay playsinline></video>

<script>
const stream = "http://198.195.239.50:8095/Tsports/index.m3u8";

function nativeFallback(){
  document.getElementById("player").style.display="none";
  const v=document.getElementById("nativeVideo");
  v.style.display="block";
  v.src=stream;
  v.play().catch(()=>{});
}

try{
jwplayer("player").setup({
 file: stream,
 width:"100%",
 height:"100%",
 autostart:true,
 mute:false,
 stretching:"uniform",
 primary:"html5"
});

jwplayer().on("error", function(){
 nativeFallback();
});

}catch(e){
 nativeFallback();
}
</script>

</body>
</html>
