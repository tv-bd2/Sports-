<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Esports PK - Live Player</title>

<style>
body{
    margin:0;
    padding:0;
    background:#fff;
    font-family:Arial,sans-serif;
    text-align:center;
}

.announcement-bar{
    background:#f1f1f1;
    color:#000;
    padding:10px 0;
    overflow:hidden;
    width:100%;
}

.marquee{
    display:inline-block;
    white-space:nowrap;
    padding-left:100%;
    animation:marquee 25s linear infinite;
    font-size:14px;
    font-weight:bold;
}

@keyframes marquee{
    0%{transform:translateX(0);}
    100%{transform:translateX(-100%);}
}

#player-wrapper{
    width:100%;
    background:#000;
}

.player-box{
    position:relative;
    width:100%;
    padding-bottom:56.25%;
    height:0;
    overflow:hidden;
    background:#000;
}

.player-box iframe{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:0;
}
</style>
</head>

<body>

<div id="player-wrapper">
    <div class="player-box">
        <iframe 
            src="https://taimoor.pro.bd/live/otvs/playex.php?id=167583"
            allowfullscreen
            scrolling="no">
        </iframe>
    </div>
</div>

<script>
document.addEventListener("contextmenu", e => e.preventDefault());
</script>

</body>
</html>
